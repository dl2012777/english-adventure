<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>学习大冒险 🎮</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: linear-gradient(135deg, #1A0A3E 0%, #2D1B69 40%, #1A237E 100%);
    min-height: 100vh; color: #fff; padding: 20px;
  }
  .container { max-width: 750px; margin: 0 auto; }
  
  /* Subject Selection */
  #subject-page { padding-top: 60px; }
  .hero { text-align: center; padding: 0 20px 40px; }
  .hero h1 { font-size: 36px; font-weight: 800; letter-spacing: 3px; margin-bottom: 8px; }
  .hero h1 .e { background: linear-gradient(135deg,#FF6B6B,#FFD93D); -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
  .hero h1 .m { background: linear-gradient(135deg,#E67E22,#2980B9); -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
  .hero p { font-size: 15px; color: rgba(255,255,255,0.5); margin-top: 6px; }
  
  .subject-grid { display: flex; flex-direction: column; gap: 20px; padding: 0 10px; }
  .subject-card {
    border-radius: 24px; padding: 40px 30px; text-align: center;
    cursor: pointer; transition: all 0.3s ease; text-decoration: none; display: block;
  }
  .subject-card:active { transform: scale(0.97); }
  .subject-card.en { background: linear-gradient(135deg, #7C5CBF, #5A3D9E); }
  .subject-card.math { background: linear-gradient(135deg, #E67E22, #D35400); }
  .subject-card .icon { font-size: 52px; margin-bottom: 8px; }
  .subject-card h2 { font-size: 26px; font-weight: 800; color: #fff; }
  .subject-card p { font-size: 14px; color: rgba(255,255,255,0.7); margin-top: 6px; line-height: 1.5; }
  
  /* Day Grid */
  #day-page { display: none; padding-top: 30px; }
  #day-page .back { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 14px; transition: all 0.2s; margin-bottom: 20px; }
  #day-page .back:active { transform: scale(0.95); }
  #day-page .subject-title { font-size: 28px; font-weight: 800; margin-bottom: 4px; text-align: center; }
  #day-page .subject-sub { font-size: 14px; color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 20px; }
  .day-grid { display: flex; flex-direction: column; gap: 12px; }
  .day-card {
    border-radius: 16px; padding: 18px 22px; text-decoration: none; color: #fff;
    display: flex; align-items: center; gap: 16px; transition: all 0.3s ease;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .day-card:active { transform: scale(0.98); }
  .day-card .num { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; flex-shrink: 0; }
  .day-card .info { flex: 1; }
  .day-card .info h3 { font-size: 16px; font-weight: 700; }
  .day-card .info .sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .day-card .arrow { font-size: 18px; color: rgba(255,255,255,0.3); flex-shrink: 0; }
  .day-card.en .num { background: linear-gradient(135deg, #A78BDB, #7C5CBF); }
  .day-card.en { background: linear-gradient(135deg, rgba(124,92,191,0.15), rgba(124,92,191,0.05)); }
  .day-card.math .num { background: linear-gradient(135deg, #F0B27A, #E67E22); }
  .day-card.math { background: linear-gradient(135deg, rgba(230,126,34,0.15), rgba(230,126,34,0.05)); }
  
  @media (max-width:480px) {
    .hero h1 { font-size: 28px; }
    .subject-card { padding: 30px 20px; }
    .day-card { padding: 14px 18px; }
  }
</style>
</head>
<body>
<div class="container">

<!-- Subject Selection -->
<div id="subject-page">
  <div class="hero">
    <h1><span class="e">学习</span> <span class="m">大冒险</span></h1>
    <p>选择你喜欢的科目开始闯关吧！</p>
  </div>
  <div class="subject-grid">
    <div class="subject-card en" onclick="showDays('en')">
      <div class="icon">🗺️</div>
      <h2>英语大冒险</h2>
      <p>沪教版 5B 下册 · 7天闯关计划<br>词汇 + 语法 + 听力 + Boss</p>
    </div>
    <div class="subject-card math" onclick="showDays('math')">
      <div class="icon">🔢</div>
      <h2>数学大冒险</h2>
      <p>北师大版 五下 · 7天闯关计划<br>口算 + 概念 + 应用 + Boss</p>
    </div>
  </div>
</div>

<!-- Day Selection -->
<div id="day-page">
  <div class="back" onclick="showSubjects()">← 返回选择科目</div>
  <div class="subject-title" id="dp-title"></div>
  <div class="subject-sub" id="dp-sub"></div>
  <div class="day-grid" id="dp-grid"></div>
</div>

</div>

<script>
const SUBJECTS = {
  en: {
    title: '🗺️ 英语大冒险',
    sub: '沪教版 5B 下册',
    color: 'en',
    days: [
      {num:1, title:'What a mess!', unit:'M1U1 · 物主代词', file:'Day1_What_a_mess.html'},
      {num:2, title:'Watch it grow!', unit:'M1U2 · 生命周期', file:'Day2_Watch_it_grow.html'},
      {num:3, title:'Listen! Food', unit:'M2U1 · 食物饮料', file:'Day3_Listen_Food.html'},
      {num:4, title:'Favourite Things', unit:'M2U2 · 我的最爱', file:'Day4_Favourite_Things.html'},
      {num:5, title:'Animals & Signs', unit:'M3U1 · 动物与标识', file:'Day5_Animals_Signs.html'},
      {num:6, title:'Weather Changes', unit:'M3U2 · 天气变化', file:'Day6_Weather_Changes.html'},
      {num:7, title:'Review 复习总结', unit:'全册综合', file:'Day7_Review.html'},
    ]
  },
  math: {
    title: '🔢 数学大冒险',
    sub: '北师大版 五下',
    color: 'math',
    days: [
      {num:1, title:'分数加减法', unit:'第一单元 · 通分与加减', file:'math-adventure/Day1_分数加减法.html'},
      {num:2, title:'长方体（一）', unit:'第二单元 · 展开图与表面积', file:'math-adventure/Day2_长方体一.html'},
      {num:3, title:'分数乘法', unit:'第三单元 · 分数乘整数与分数', file:'math-adventure/Day3_分数乘法.html'},
      {num:4, title:'体积与除法', unit:'第四单元 · 体积容积与分数除法', file:'math-adventure/Day4_体积与除法.html'},
      {num:5, title:'位置与方程', unit:'第五单元 · 确定位置与方程', file:'math-adventure/Day5_位置与方程.html'},
      {num:6, title:'数据与分析', unit:'第六单元 · 统计图表与平均数', file:'math-adventure/Day6_数据与分析.html'},
      {num:7, title:'总复习', unit:'第七单元 · 全册综合', file:'math-adventure/Day7_总复习.html'},
    ]
  }
};

function showDays(subject) {
  const s = SUBJECTS[subject];
  if (!s) return;
  document.getElementById('subject-page').style.display = 'none';
  document.getElementById('day-page').style.display = 'block';
  document.getElementById('dp-title').textContent = s.title;
  document.getElementById('dp-sub').textContent = s.sub;
  const grid = document.getElementById('dp-grid');
  grid.innerHTML = '';
  s.days.forEach(d => {
    const a = document.createElement('a');
    a.className = 'day-card ' + s.color;
    a.href = d.file;
    a.innerHTML = `
      <div class="num">${d.num}</div>
      <div class="info"><h3>${d.title}</h3><div class="sub">${d.unit}</div></div>
      <div class="arrow">→</div>`;
    grid.appendChild(a);
  });
}

function showSubjects() {
  document.getElementById('subject-page').style.display = 'block';
  document.getElementById('day-page').style.display = 'none';
}
</script>
</body>
</html>
